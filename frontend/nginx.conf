server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Backend: Swagger UI (must come before the SPA fallback) ──────────────
    # Proxies /api-docs and all of Swagger's own static assets
    # (/api-docs/, /api-docs/swagger-ui.css, etc.)
    location /api-docs {
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Backend: REST API ─────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Frontend: React SPA fallback (must be last) ───────────────────────────
    # Only reached when neither /api-docs nor /api/ matched.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
